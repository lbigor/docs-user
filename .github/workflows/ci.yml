name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'
      - name: Validar frontmatter das skills
        run: |
          for f in SKILL.md onboarding.md git-setup.md git-flow.md template.md manifesto-schema.yml; do
            [ -f "$f" ] && echo "✓ $f existe" || { echo "✗ falta $f"; exit 1; }
          done
      - name: Link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-verbose-mode: yes
          max-depth: 2
